{% extends "layout.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}

<div class="text-center py-5">
    <i class="bi bi-emoji-frown" style="font-size: 5rem; color: #dc3545;"></i>
    <h1 class="display-4 mt-3">404</h1>
    <h4 class="text-muted">Page Not Found</h4>
    <p class="text-muted">The page you are looking for does not exist.</p>
    <a href="{{ url_for('dashboard.dashboard') if session.get('user_id') else url_for('auth.home') }}" class="btn btn-primary mt-3">
        <i class="bi bi-house"></i> Go Home
    </a>
</div>

{% endblock %}
