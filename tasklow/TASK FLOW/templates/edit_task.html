{% extends "layout.html" %}

{% block title %}Edit Task | TaskFlow{% endblock %}

{% block content %}

<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('dashboard.dashboard') }}">Dashboard</a></li>
        <li class="breadcrumb-item"><a href="{{ url_for('tasks.list_tasks') }}">Tasks</a></li>
        <li class="breadcrumb-item active">Edit: {{ task.title }}</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-header bg-white border-bottom">
                <h4 class="mb-0"><i class="bi bi-pencil"></i> Edit Task</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="title" value="{{ task.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3">{{ task.description or '' }}</textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Project</label>
                            <select class="form-select" name="project_id" disabled>
                                {% for p in projects %}
                                <option value="{{ p.id }}" {% if task.project_id == p.id %}selected{% endif %}>{{ p.project_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Assignee</label>
                            <select class="form-select" name="assigned_to">
                                <option value="">Unassigned</option>
                                {% for u in users %}
                                <option value="{{ u.id }}" {% if task.assigned_to == u.id %}selected{% endif %}>{{ u.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Priority</label>
                            <select class="form-select" name="priority">
                                <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                                <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                                <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                                <option value="Critical" {% if task.priority == 'Critical' %}selected{% endif %}>Critical</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="status">
                                <option value="To Do" {% if task.status == 'To Do' %}selected{% endif %}>To Do</option>
                                <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                                <option value="Review" {% if task.status == 'Review' %}selected{% endif %}>Review</option>
                                <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Due Date</label>
                            <input type="date" class="form-control" name="due_date" value="{{ task.due_date }}">
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update Task</button>
                        <a href="{{ url_for('tasks.list_tasks') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
