{% extends "layout.html" %}

{% block title %}
Login | TaskFlow
{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2 class="fw-bold text-primary">
                        Welcome Back
                    </h2>

                    <p class="text-muted">
                        Login to your TaskFlow account
                    </p>

                </div>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Email Address
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            Login

                        </button>

                    </div>

                </form>

                <hr>

                <div class="text-center">

                    Don't have an account?

                    <a href="{{ url_for('auth.register') }}">

                        Register

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
