{% extends "layout.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}

<div class="text-center py-5">
    <i class="bi bi-exclamation-triangle" style="font-size: 5rem; color: #ffc107;"></i>
    <h1 class="display-4 mt-3">500</h1>
    <h4 class="text-muted">Internal Server Error</h4>
    <p class="text-muted">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('dashboard.dashboard') if session.get('user_id') else url_for('auth.home') }}" class="btn btn-primary mt-3">
        <i class="bi bi-house"></i> Go Home
    </a>
</div>

{% endblock %}
